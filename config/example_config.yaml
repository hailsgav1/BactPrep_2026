# NOTE: this file will be automatically generated if you run the workflow by using options in start_analysis.py
# this is just an explanation for parameters used in the workflow
# if you would like to directly run pipeline with the config file, please refer to the snakemake documentation
# https://snakemake.readthedocs.io/en/stable/index.html#

# folder containing BactPrep workflow (this is the folder you have git cloned)
bactprep_path: /path/to/BactPrep

# path to MCR runtime. If you have ran INSTALL.sh before, this has already been installed and setup.
mcr_path: /path/to/BactPrep/resources/mcr/v901

LD_LIBRARY_PATH: /path/to/BactPrep/resources/mcr/v901/runtime/glnxa64:/path/to/BactPrep/resources/mcr/v901/bin/glnxa64:/path/to/BactPrep/resources/mcr/v901/sys/os/glnxa64

# input directory containing all WGS assemblies you would like to include in the analysis
asm_dir: /path/to/assemblies

# output directory for analysis results
output_dir: /path/to/output

# what is the name of the current project
project_name: my_project

# number of threads to use
threads_num: 16

# for coreGen module
# 1) definition of core gene (percent of WGS in the dataset sharing the orthologs)
define_core: 99
# 2) additional parameters for Roary (details in: https://sanger-pathogens.github.io/Roary/)
roary: ''
# 3) if Prokka annotation has already been ran, specify the directory
gff_dir: null
# 4) annotating bacteria genome (for Prokka)
kingdom: Bacteria

# for wgsRecomb module
# 1) Gubbins requires a reference genome
reference: /path/to/reference.fna
# 2) additional Gubbins parameters (details in: https://github.com/nickjcroucher/gubbins)
gubbins: ''
# 3) if known phage region needs to be specified
phage_region: ''

# for coreRecomb module
# path to fastGear executable (installed by INSTALL.sh)
fastGear_exe_path: /path/to/BactPrep/resources/fastGEARpackageLinux64bit/
fastGear_params: /path/to/BactPrep/resources/fastGEARpackageLinux64bit/fG_input_specs.txt

# for geneRecomb module - specific genes to detect recombination from
fastgear_gene_file_list: ''

# annotate output alignments and phylogenies
# path to metadata CSV file
sample_metadata: /path/to/metadata.csv
# column with matching sample names as input assemblies
biosample_column: 1
# column names in the metadata file to add to the annotation (comma separated)
metadata_include: Year,Country
